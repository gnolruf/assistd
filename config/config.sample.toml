# assistd configuration
# Copy to ~/.config/assistd/config.toml and edit to taste.
# All fields are required unless noted otherwise.

[model]
# Model identifier passed to llama-server's --hf flag.
# Format: owner/repo:quant (e.g. "bartowski/Qwen3-14B-GGUF:Q4_K_M")
name = "bartowski/Qwen3-14B-GGUF:Q4_K_M"
# Context window length in tokens. Must be > 0.
context_length = 8192

[llama_server]
# Path to the llama-server binary. Absolute path or a name resolvable via $PATH.
binary_path = "llama-server"
# Host llama-server binds to. Should be a loopback address.
host = "127.0.0.1"
# TCP port llama-server binds to. Must differ from remote.port.
port = 8385
# GPU layer count passed as -ngl. Default 9999 offloads all layers; reduce if
# running out of VRAM.
# gpu_layers = 9999
# Timeout in seconds for the health check. Increase for first-time HuggingFace
# downloads on slow connections.
# ready_timeout_secs = 300

[chat]
# System prompt injected as the first message of every request. Leave empty
# (system_prompt = "") to skip system-prompt injection entirely.
system_prompt = "You are assistd, a concise local desktop assistant running on a Linux workstation. You have a `run` tool that executes shell-style commands (bash, cat, ls, grep, wc, echo, write, see, web) — prefer calling `run` over guessing when a question is about this machine or its files. Pipes (|), and/or (&&, ||), and sequencing (;) are supported inside a single `run` call, so a one-liner like `cat log.txt | grep ERROR | wc -l` is usually better than three separate tool calls. Answer precisely and in a conversational tone."
# Approximate token budget for the full request (system + history). Must be
# strictly less than model.context_length. When exceeded, older messages are
# summarized and replaced by a single summary message.
max_history_tokens = 6000
# Approximate target length of a conversation summary, in tokens.
summary_target_tokens = 1000
# Preserve the last N user/assistant exchanges verbatim when summarizing.
preserve_recent_turns = 4
# Sampling temperature, 0.0..=2.0.
temperature = 0.7
# Maximum tokens the model may emit in a single streamed response.
max_response_tokens = 1024
# Maximum tokens for the summarization (non-streaming) call. Typically a bit
# above summary_target_tokens.
max_summary_tokens = 1200
# HTTP request timeout for a single /v1/chat/completions call.
request_timeout_secs = 120

[voice]
# Enable voice input via microphone.
enabled = false
# ALSA/PulseAudio device name (optional). Omit for system default.
# mic_device = "hw:0,0"
# Hotkey to activate voice input.
hotkey = "Super+V"

[compositor]
# Tiling compositor to integrate with. One of: i3, sway, hyprland
type = "sway"

[sleep]
# Whether to suspend the machine (true) or just deactivate (false).
suspend = false

# ---- Idle-based auto-sleep ----
# Minutes of no user interaction after which the daemon drops Active → Drowsy
# (model weights unloaded, server stays alive). 0 disables this transition.
# idle_to_drowsy_mins = 30
# Minutes of no user interaction after which the daemon drops to Sleeping
# (llama-server stopped, all VRAM freed). Must be greater than
# idle_to_drowsy_mins when both are non-zero. 0 disables this transition.
# idle_to_sleep_mins = 120

# ---- GPU contention monitor ----
# Background NVML poller that transitions the daemon to Sleeping when another
# process (e.g. a game) claims VRAM. Silently disables itself when no NVIDIA
# GPU is available.
#
# Enable the monitor. Default true.
# gpu_monitor_enabled = true
# NVML poll interval in seconds. Must be > 0 when enabled.
# gpu_poll_secs = 5
# Per-process VRAM threshold in MiB. A non-assistd process holding at least
# this much VRAM triggers sleep. 2048 = 2 GiB. Must be > 0 when enabled.
# gpu_vram_threshold_mb = 2048
# When true, the daemon auto-wakes once the contending process exits. Default
# false so the daemon stays out of the way while you are still gaming.
# gpu_auto_wake = false
# Process basenames that never trigger sleep, even above the threshold.
# Matched against /proc/<pid>/comm, which the kernel truncates at 16 bytes —
# e.g. "chromium_main" fits but "systemd-userdbd" becomes "systemd-userdb".
# gpu_allowlist = ["Xorg", "Xwayland", "gnome-shell", "kwin_x11",
#                  "kwin_wayland", "firefox", "chromium", "chrome"]
# Process basenames that always trigger sleep regardless of VRAM usage.
# gpu_denylist = []

[remote]
# Enable the remote access API.
enabled = false
# IP address to bind to.
bind_address = "127.0.0.1"
# TCP port to listen on. Must not be 0 when remote is enabled.
port = 8384

[presence]
# Global hotkey that cycles Active → Drowsy → Sleeping → Active.
# Empty string disables the in-daemon global hotkey listener.
#
# The in-daemon listener only works on X11. On Wayland compositors
# (Sway, Hyprland), leave this empty and bind `assistd cycle` in your
# compositor config instead, e.g. Sway:
#   bindsym $mod+Escape exec assistd cycle
hotkey = "Super+Escape"

[daemon]
# Seconds to wait for in-flight IPC connections (e.g. streaming LLM
# responses) to finish before aborting them on daemon shutdown. 0 aborts
# all in-flight work immediately; higher values let clients receive a
# final Done event before the daemon exits.
# shutdown_grace_secs = 5

[agent]
# Maximum number of LLM invocations per user turn. The agent loop sends
# the `run` tool schema to the model, executes any requested commands,
# and iterates until the model returns plain text — or until this cap
# is hit. 20 is deliberately generous: each `run` call is cheap and
# pipelines reduce the number of round-trips needed for most queries.
# max_iterations = 20

# ---------------------------------------------------------------------------
# Tool execution safety
# ---------------------------------------------------------------------------
# Honest note: the bash policy (denylist, destructive_patterns) is a
# backstop for *obvious* dangerous invocations. A sufficiently clever LLM
# can defeat any syntactic check (variable expansion, command
# substitution, here-docs). The bubblewrap sandbox is the real
# defense-in-depth; install bubblewrap (package: bubblewrap) and keep
# tools.bash.sandbox = "auto" to benefit from it.

[tools.bash]
# Subprocess timeout in seconds. Must be > 0. Exceeding the timeout
# kills the process group and returns exit 137 with the message
#   [error] bash: timed out after 30s [exit:137 | 30.0s]
# timeout_secs = 30

# Denylist: literal substrings that, if present in a bash script
# (case-insensitive), cause immediate rejection before spawn with exit
# 126. Use for patterns that should never be executed under any
# circumstances. The matched pattern is echoed back in the error line
# so the LLM sees exactly what triggered the rejection.
# denylist = [
#     "rm -rf /",
#     "rm -rf /*",
#     "rm -rf /home",
#     "mkfs",
#     "dd if=/dev/zero",
#     ":(){ :|:& };:",
#     "> /dev/sda",
#     "> /dev/nvme",
# ]

# Destructive patterns: shell-tokenized word prefixes that trigger an
# interactive Y/N confirmation prompt in the chat TUI (or are denied by
# default over IPC, where no confirmation channel exists). More permissive
# than the denylist: these are "dangerous but sometimes needed" operations.
# Example: `rm -rf foo` matches `["rm", "-rf"]` and prompts; `echo "rm -rf"`
# is a quoted literal and does NOT match.
# destructive_patterns = [
#     "rm -rf",
#     "rm -fr",
#     "git push --force",
#     "git push -f",
#     "git reset --hard",
#     "dd of=",
#     "shutdown",
#     "reboot",
#     "kill -9 -1",
# ]

# Sandbox mode for bash subprocess execution. One of:
#   auto  — use bubblewrap if found on PATH; log warn and run unsandboxed if not.
#   bwrap — require bubblewrap; fail daemon startup if `bwrap` is missing.
#   none  — never wrap; run bash directly under the daemon's user.
# Default "auto" gives defense-in-depth on systems with bubblewrap without
# breaking systems without it.
# sandbox = "auto"

# Extra arguments appended to the bubblewrap invocation (before the
# trailing `--`). Useful for widening binds or tightening the sandbox.
# The default profile is:
#   --ro-bind / /            (root is read-only)
#   --bind $HOME $HOME       ($HOME is writable)
#   --bind /tmp /tmp         (/tmp is writable)
#   --dev /dev --proc /proc  (standard)
#   --tmpfs /run             (fresh, empty /run)
#   --unshare-pid --unshare-ipc --unshare-uts
#   --new-session --die-with-parent
# Crucially NOT --unshare-net: network is available by default because the
# assistant legitimately needs curl/pip/etc. Opt into network isolation via:
#   bwrap_extra_args = ["--unshare-net"]
# bwrap_extra_args = []

[tools.write]
# Writable-path allowlist for the `write` command. Paths outside every
# entry are rejected with exit 126. Supports `~` and `~/` expansion.
# Relative paths are always rejected (the daemon's cwd is not a meaningful
# anchor). Non-existent allowlist entries are dropped with a warning at
# startup, so missing `~/Documents` on a fresh install won't break the
# command entirely.
# writable_paths = ["~", "/tmp"]
