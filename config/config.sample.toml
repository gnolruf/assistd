# assistd configuration
# Copy to ~/.config/assistd/config.toml and edit to taste.
# All fields are required unless noted otherwise.

[model]
# Model identifier passed to llama-server's --hf flag.
# Format: owner/repo:quant (e.g. "bartowski/Qwen3-14B-GGUF:Q4_K_M")
name = "bartowski/Qwen3-14B-GGUF:Q4_K_M"
# Context window length in tokens. Must be > 0.
context_length = 8192

[llama_server]
# Path to the llama-server binary. Absolute path or a name resolvable via $PATH.
binary_path = "llama-server"
# Host llama-server binds to. Should be a loopback address.
host = "127.0.0.1"
# TCP port llama-server binds to. Must differ from remote.port.
port = 8385
# GPU layer count passed as -ngl. Default 9999 offloads all layers; reduce if
# running out of VRAM.
# gpu_layers = 9999
# Timeout in seconds for the health check. Increase for first-time HuggingFace
# downloads on slow connections.
# ready_timeout_secs = 300
# Optional alias passed as --alias. Cosmetic: it's the name llama-server
# reports for the loaded model in /v1/models.
# alias = "qwen3.6-35b-a3b"
# Tensor-override regex passed as -ot. For MoE models, offloading expert
# tensors to CPU frees VRAM for the rest of the model:
# override_tensor = "\\.ffn_(up|down|gate)_exps\\.=CPU"
# Enable flash-attention (--flash-attn on). Big speed + memory win on
# GPUs that support it.
# flash_attn = true
# KV-cache quantization. "q8_0" roughly halves KV memory for a negligible
# quality loss — essential for long contexts on consumer GPUs.
# cache_type_k = "q8_0"
# cache_type_v = "q8_0"
# CPU thread count (--threads). Omit to let llama.cpp auto-detect.
# threads = 8
# --batch-size / --ubatch-size. Raising the ubatch speeds prefill on
# MoE models; 1024–2048 is a good range if you have VRAM headroom.
# batch_size = 2048
# ubatch_size = 2048
# --n-cpu-moe N: keep only the first N MoE layers' experts on CPU; the
# remainder go to GPU. Preferred over override_tensor because it's
# layer-granular — tune N down until VRAM is nearly full.
# n_cpu_moe = 30
# --cache-ram MiB: prompt-checkpoint cache size. Default is 8192. Raising
# this speeds up re-prefill when a conversation grows, at the cost of RAM.
# cache_ram_mib = 32768
# --mlock: pin model pages in RAM so the OS can't page them out. Useful
# when running memory-hungry workloads alongside the daemon. NOTE: your
# system's RLIMIT_MEMLOCK must allow enough pinning — see
# /etc/security/limits.conf or LimitMEMLOCK= in a systemd unit.
# mlock = true
# --no-mmproj-offload: keep the vision encoder on CPU. Set false when
# VRAM is fully consumed by the LLM — image preprocessing becomes
# slightly slower but avoids CUDA OOM on image requests.
# mmproj_offload = false

[chat]
# System prompt injected as the first message of every request. Leave empty
# (system_prompt = "") to skip system-prompt injection entirely.
system_prompt = "You are assistd, a concise local desktop assistant running on a Linux workstation. You have a `run` tool that executes shell-style commands (bash, cat, ls, grep, wc, echo, write, see, web) — prefer calling `run` over guessing when a question is about this machine or its files. Pipes (|), and/or (&&, ||), and sequencing (;) are supported inside a single `run` call, so a one-liner like `cat log.txt | grep ERROR | wc -l` is usually better than three separate tool calls. Answer precisely and in a conversational tone."
# Approximate token budget for the full request (system + history). Must be
# strictly less than model.context_length. When exceeded, older messages are
# summarized and replaced by a single summary message.
max_history_tokens = 6000
# Approximate target length of a conversation summary, in tokens.
summary_target_tokens = 1000
# Preserve the last N user/assistant exchanges verbatim when summarizing.
preserve_recent_turns = 4
# Sampling temperature, 0.0..=2.0.
temperature = 0.7
# Nucleus sampling cutoff, 0.0..=1.0. Omit to let llama-server pick its default.
# top_p = 0.95
# Top-k sampling limit.
# top_k = 20
# Min-p sampling cutoff, 0.0..=1.0.
# min_p = 0.0
# Presence penalty in -2.0..=2.0. Qwen3 reasoning variants recommend a small
# positive value to reduce looping.
# presence_penalty = 1.5
# Maximum tokens the model may emit in a single streamed response.
max_response_tokens = 1024
# Maximum tokens for the summarization (non-streaming) call. Typically a bit
# above summary_target_tokens.
max_summary_tokens = 1200
# HTTP request timeout for a single /v1/chat/completions call.
request_timeout_secs = 120
# Sampling temperature for the non-streaming summarization call. Lower
# than `temperature` by default because summaries should be deterministic.
# Range: 0.0..=2.0.
# summary_temperature = 0.3

[voice]
# Enable voice input via microphone.
enabled = false
# ALSA/PulseAudio device name (optional). Omit for system default.
# mic_device = "hw:0,0"
# Hotkey to hold for push-to-talk. Release to transcribe and auto-submit.
# Empty string disables the in-process hotkey listener; the IPC commands
# (`assistd ptt-start` / `ptt-stop`) always work regardless, for i3/sway
# `bindsym` users:
#   bindsym           $mod+space exec --no-startup-id assistd ptt-start
#   bindsym --release $mod+space exec --no-startup-id assistd ptt-stop
hotkey = "Super+Space"
# Upper bound on a single PTT recording in seconds. The ring buffer
# drops newer samples past this length; transcription still runs on
# what was captured. Also determines pre-allocated buffer size.
# max_recording_secs = 60

[voice.transcription]
# HuggingFace identifier for the Whisper GGML model, formatted as
# "<owner>/<repo>:<file>". Downloaded on first use and cached under
# $XDG_CACHE_HOME/assistd/whisper/ (or ~/.cache/assistd/whisper/).
# model = "ggerganov/whisper.cpp:ggml-large-v3-turbo-q5_0.bin"
# Prefer GPU inference. Falls back to CPU with a warning log when no
# CUDA device is detected, or when assistd-voice was built without
# the `cuda` cargo feature. On GPUs shared with llama-server, leave
# an eye on total VRAM: large-v3-turbo Q5 uses ~1 GiB.
# prefer_gpu = true
# CPU thread count. Omit to let whisper.cpp auto-detect.
# threads = 8
# Decode beams. 1 = greedy (lowest latency). Higher values improve
# accuracy at roughly linear cost.
# beams = 1
# Silero VAD trims leading/trailing silence before decoding. Disabling
# VAD is useful only for debugging — whisper.cpp hallucinates on
# prolonged silence.
# vad_enabled = true
# VAD GGML model (HF identifier).
# vad_model = "ggml-org/whisper-vad:ggml-silero-v6.2.0.bin"
# Approximate minimum silence length (seconds) required to split or
# trim a speech segment. Maps to whisper.cpp's min_silence_duration_ms.
# vad_silence_secs = 0.5
# Override the on-disk model cache directory. Omit for the XDG default.
# model_cache_dir = "/var/cache/assistd/whisper"
# When the primary Whisper context is GPU-backed and the daemon is
# currently streaming an LLM response on the same GPU, Whisper briefly
# waits for the stream to drain before running inference. After this
# many milliseconds, it falls back to a lazily-built CPU context for
# that utterance. Set to 0 to always prefer CPU when any LLM stream is
# in flight; cap is 10000 (10 s).
# gpu_busy_timeout_ms = 300
# Build a CPU fallback context on demand when the GPU is busy. Disable
# to force strict GPU-only transcription (users wait for the LLM stream
# to finish before their utterance is transcribed).
# cpu_fallback_enabled = true

[voice.continuous]
# Hands-free continuous listening. When enabled, the daemon keeps the
# mic open and uses webrtc-vad to detect speech onset/offset, transcribing
# each completed utterance and auto-dispatching the text to the agent loop.
# The mic is released while presence is Sleeping so stray room speech
# doesn't repeatedly warm up llama-server.
enabled = false
# Start listening automatically at daemon launch. When false, the listener
# is built but idle; toggle it with the hotkey or `assistd listen-toggle`.
# start_on_launch = false
# Hotkey that toggles listening on/off. Empty disables the binding.
# hotkey = "Super+Shift+L"
# Trailing silence (ms) that ends an utterance. Larger values tolerate
# longer mid-sentence pauses.
# silence_ms = 800
# Utterances shorter than this are dropped without transcription.
# min_utterance_ms = 400
# Force-flush cap, in seconds, to bound per-utterance memory use.
# max_utterance_secs = 30
# Rolling pre-roll appended to a new utterance so onset confirmation
# doesn't clip the first syllable.
# preroll_ms = 300
# Voiced frames required to confirm onset (guards against keystroke
# clicks and fan pops).
# onset_confirm_ms = 60
# webrtc-vad aggressiveness, 0..=3. Higher is more aggressive at
# rejecting non-speech.
# aggressiveness = 3

[voice.synthesis]
# Speak LLM responses aloud through a local Piper TTS subprocess. When
# enabled, the daemon spawns piper per utterance, writes one sentence to
# stdin, reads raw PCM from stdout, and plays it through the default
# audio device via rodio. Falls back silently with a warning log if the
# piper binary is missing, the voice model fails to download, or no
# audio device is available — the daemon stays up either way.
enabled = false
# Path to (or name of) the piper binary. A bare command name is looked
# up via $PATH.
# binary_path = "piper"
# HuggingFace identifier for the Piper voice ONNX, formatted as
# "<owner>/<repo>:<file>" where <file> is the path of the .onnx inside
# the repo. The matching .onnx.json is downloaded alongside it. Cached
# under $XDG_CACHE_HOME/assistd/piper/ (or ~/.cache/assistd/piper/).
# voice = "rhasspy/piper-voices:en/en_US/lessac/medium/en_US-lessac-medium.onnx"
# Override the on-disk voice cache directory. Omit for the XDG default.
# model_cache_dir = "/var/cache/assistd/piper"
# Speaking-rate scale. 1.0 is the voice's natural rate; lower = faster.
# length_scale = 1.0
# Sampling noise scale (--noise-scale). Higher = more pitch variation.
# noise_scale = 0.667
# Phoneme noise scale (--noise-w). Higher = more cadence variation.
# noise_w = 0.8
# Trailing silence (seconds) Piper inserts after each utterance.
# sentence_silence_secs = 0.2
# Optional override for Piper's espeak-ng data directory. Only set when
# piper logs "Failed to load espeak-ng" — most distro packages handle
# this themselves.
# espeak_data_dir = "/usr/share/espeak-ng-data"
# Per-utterance synthesis deadline in seconds. Piper is killed if it
# hasn't returned PCM by this point.
# deadline_secs = 30
# Maximum sentence length fed to Piper. The sentence buffer flushes at
# the last whitespace before this cap when no terminator appears within
# the limit.
# max_sentence_chars = 400
# Global hotkey that toggles TTS on/off at runtime. Empty = no
# binding (use `assistd voice-toggle` from the CLI instead). Off
# silences current playback; on resumes for the next sentence.
# Examples: "Super+Shift+M", "Ctrl+Alt+M".
# toggle_hotkey = ""
# Global hotkey that aborts the current response: drops the rest of
# the audio queue and any pending sentences for the in-flight query
# without starting recording. Empty = no binding (use
# `assistd voice-skip` instead).
# skip_hotkey = ""

[compositor]
# Tiling compositor to integrate with. One of: i3, sway, hyprland
type = "sway"

[sleep]
# Whether to suspend the machine (true) or just deactivate (false).
suspend = false

# ---- Idle-based auto-sleep ----
# Minutes of no user interaction after which the daemon drops Active → Drowsy
# (model weights unloaded, server stays alive). 0 disables this transition.
# idle_to_drowsy_mins = 30
# Minutes of no user interaction after which the daemon drops to Sleeping
# (llama-server stopped, all VRAM freed). Must be greater than
# idle_to_drowsy_mins when both are non-zero. 0 disables this transition.
# idle_to_sleep_mins = 120

# ---- GPU contention monitor ----
# Background NVML poller that transitions the daemon to Sleeping when another
# process (e.g. a game) claims VRAM. Silently disables itself when no NVIDIA
# GPU is available.
#
# Enable the monitor. Default true.
# gpu_monitor_enabled = true
# NVML poll interval in seconds. Must be > 0 when enabled.
# gpu_poll_secs = 5
# Per-process VRAM threshold in MiB. A non-assistd process holding at least
# this much VRAM triggers sleep. 2048 = 2 GiB. Must be > 0 when enabled.
# gpu_vram_threshold_mb = 2048
# When true, the daemon auto-wakes once the contending process exits. Default
# false so the daemon stays out of the way while you are still gaming.
# gpu_auto_wake = false
# Process basenames that never trigger sleep, even above the threshold.
# Matched against /proc/<pid>/comm, which the kernel truncates at 16 bytes —
# e.g. "chromium_main" fits but "systemd-userdbd" becomes "systemd-userdb".
# gpu_allowlist = ["Xorg", "Xwayland", "gnome-shell", "kwin_x11",
#                  "kwin_wayland", "firefox", "chromium", "chrome"]
# Process basenames that always trigger sleep regardless of VRAM usage.
# gpu_denylist = []

[remote]
# Enable the remote access API.
enabled = false
# IP address to bind to.
bind_address = "127.0.0.1"
# TCP port to listen on. Must not be 0 when remote is enabled.
port = 8384

[presence]
# Global hotkey that cycles Active → Drowsy → Sleeping → Active.
# Empty string disables the in-daemon global hotkey listener.
#
# The in-daemon listener only works on X11. On Wayland compositors
# (Sway, Hyprland), leave this empty and bind `assistd cycle` in your
# compositor config instead, e.g. Sway:
#   bindsym $mod+Escape exec assistd cycle
hotkey = "Super+Escape"

[daemon]
# Seconds to wait for in-flight IPC connections (e.g. streaming LLM
# responses) to finish before aborting them on daemon shutdown. 0 aborts
# all in-flight work immediately; higher values let clients receive a
# final Done event before the daemon exits.
# shutdown_grace_secs = 5

[agent]
# Maximum number of LLM invocations per user turn. The agent loop sends
# the `run` tool schema to the model, executes any requested commands,
# and iterates until the model returns plain text — or until this cap
# is hit. 20 is deliberately generous: each `run` call is cheap and
# pipelines reduce the number of round-trips needed for most queries.
# max_iterations = 20

# ---------------------------------------------------------------------------
# Tool execution safety
# ---------------------------------------------------------------------------
# Honest note: the bash policy (denylist, destructive_patterns) is a
# backstop for *obvious* dangerous invocations. A sufficiently clever LLM
# can defeat any syntactic check (variable expansion, command
# substitution, here-docs). The bubblewrap sandbox is the real
# defense-in-depth; install bubblewrap (package: bubblewrap) and keep
# tools.bash.sandbox = "auto" to benefit from it.

[tools.bash]
# Subprocess timeout in seconds. Must be > 0. Exceeding the timeout
# kills the process group and returns exit 137 with the message
#   [error] bash: timed out after 30s [exit:137 | 30.0s]
# timeout_secs = 30

# Denylist: literal substrings that, if present in a bash script
# (case-insensitive), cause immediate rejection before spawn with exit
# 126. Use for patterns that should never be executed under any
# circumstances. The matched pattern is echoed back in the error line
# so the LLM sees exactly what triggered the rejection.
# denylist = [
#     "rm -rf /",
#     "rm -rf /*",
#     "rm -rf /home",
#     "mkfs",
#     "dd if=/dev/zero",
#     ":(){ :|:& };:",
#     "> /dev/sda",
#     "> /dev/nvme",
# ]

# Destructive patterns: shell-tokenized word prefixes that trigger an
# interactive Y/N confirmation prompt in the chat TUI (or are denied by
# default over IPC, where no confirmation channel exists). More permissive
# than the denylist: these are "dangerous but sometimes needed" operations.
# Example: `rm -rf foo` matches `["rm", "-rf"]` and prompts; `echo "rm -rf"`
# is a quoted literal and does NOT match.
# destructive_patterns = [
#     "rm -rf",
#     "rm -fr",
#     "git push --force",
#     "git push -f",
#     "git reset --hard",
#     "dd of=",
#     "shutdown",
#     "reboot",
#     "kill -9 -1",
# ]

# Sandbox mode for bash subprocess execution. One of:
#   auto  — use bubblewrap if found on PATH; log warn and run unsandboxed if not.
#   bwrap — require bubblewrap; fail daemon startup if `bwrap` is missing.
#   none  — never wrap; run bash directly under the daemon's user.
# Default "auto" gives defense-in-depth on systems with bubblewrap without
# breaking systems without it.
# sandbox = "auto"

# Extra arguments appended to the bubblewrap invocation (before the
# trailing `--`). Useful for widening binds or tightening the sandbox.
# The default profile is:
#   --ro-bind / /            (root is read-only)
#   --bind $HOME $HOME       ($HOME is writable)
#   --bind /tmp /tmp         (/tmp is writable)
#   --dev /dev --proc /proc  (standard)
#   --tmpfs /run             (fresh, empty /run)
#   --unshare-pid --unshare-ipc --unshare-uts
#   --new-session --die-with-parent
# Crucially NOT --unshare-net: network is available by default because the
# assistant legitimately needs curl/pip/etc. Opt into network isolation via:
#   bwrap_extra_args = ["--unshare-net"]
# bwrap_extra_args = []

[tools.write]
# Writable-path allowlist for the `write` command. Paths outside every
# entry are rejected with exit 126. Supports `~` and `~/` expansion.
# Relative paths are always rejected (the daemon's cwd is not a meaningful
# anchor). Non-existent allowlist entries are dropped with a warning at
# startup, so missing `~/Documents` on a fresh install won't break the
# command entirely.
# writable_paths = ["~", "/tmp"]

[tools.screenshot]
# Capture the user's screen as a PNG on demand and attach it as a vision
# input for the next LLM turn. The agent invokes this via `run` with
# `screenshot` (full screen) or `screenshot --focused` (focused window).
# Bytes are kept in memory; nothing is written to disk by default.
#
# Privacy: the captured pixels reach the LLM as part of its next turn.
# The default backend (`auto`) picks maim on X11 and grim on Wayland.
#
# Backend selector. One of:
#   auto    — XDG_SESSION_TYPE / WAYLAND_DISPLAY / DISPLAY decide.
#   x11     — always use maim (requires xdotool for --focused).
#   wayland — always use grim (--focused requires sway or Hyprland).
# backend = "auto"

# Capture subprocess timeout in seconds. Must be > 0. A wedged compositor
# is killed at the deadline and the command returns exit 137.
# timeout_secs = 5
