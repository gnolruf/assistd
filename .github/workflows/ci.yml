name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  ci:
    name: fmt + clippy + test + release build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Rustfmt (check)
        run: cargo fmt --all -- --check

      # --all-features can't be used here: assistd-voice exposes a `cuda`
      # feature that links against cuBLAS/cudart, which aren't installed
      # on ubuntu-latest. Enable the test-support features explicitly so
      # integration test code is still linted/exercised.
      - name: Clippy (deny warnings)
        run: |
          cargo clippy --workspace --all-targets --locked \
            --features assistd-llm/test-support,assistd-voice/test-support \
            -- -D warnings

      - name: Test
        run: |
          cargo test --workspace --locked \
            --features assistd-llm/test-support

      - name: cargo-deny (advisories, licenses, bans)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

      - name: Release build (default features)
        run: cargo build --release -p assistd-cli --locked

      - name: Release build (client-only)
        run: cargo build --release -p assistd-cli --no-default-features --features client --locked

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: assistd-linux-x86_64
          path: target/release/assistd
          if-no-files-found: error
          retention-days: 14
