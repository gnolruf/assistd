version: 2
  updates:
    - package-ecosystem: "cargo"
      directory: "/"
      schedule:
        interval: "weekly"
      open-pull-requests-limit: 10
      commit-message:
        prefix: "deps"
        include: "scope"
      groups:
        cargo-minor-patch:
          update-types:
            - "minor"
            - "patch"
        cargo-major:
          update-types:
            - "major"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
        interval: "weekly"
      commit-message:
        prefix: "ci"
      groups:
        github-actions:
          patterns:
            - "*"
