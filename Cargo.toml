[workspace]
resolver = "2"
members = [
    "crates/assistd",
    "crates/assistd-core",
    "crates/assistd-ipc",
    "crates/assistd-llm",
    "crates/assistd-voice",
    "crates/assistd-tools",
    "crates/assistd-wm",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[workspace.dependencies]
# Internal crates
assistd-core  = { path = "crates/assistd-core" }
assistd-ipc   = { path = "crates/assistd-ipc" }
assistd-llm   = { path = "crates/assistd-llm" }
assistd-voice = { path = "crates/assistd-voice" }
assistd-tools = { path = "crates/assistd-tools" }
assistd-wm    = { path = "crates/assistd-wm" }

# External crates
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
thiserror = "1"
toml = "0.8"
clap = { version = "4", features = ["derive"] }
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"
