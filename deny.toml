# cargo-deny configuration for assistd.
#
# Checks licenses, advisories, and dependency duplication. Run locally with
#   cargo deny check
# or see .github/workflows/ci.yml for the CI invocation.
#
# Documentation: https://embarkstudios.github.io/cargo-deny/

[graph]
# Only the host target matters for this daemon.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
]
all-features = true

# ---------------------------------------------------------------------------
# Advisories: block known-vulnerable or yanked versions.
# ---------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

# ---------------------------------------------------------------------------
# Licenses: keep the dependency set Apache-2.0-compatible.
# ---------------------------------------------------------------------------
[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # whisper-rs / whisper-rs-sys ship under the Unlicense (public-domain
    # dedication). OSI-approved and FSF Free/Libre compatible with our
    # Apache-2.0 downstream.
    "Unlicense",
]

# Per-crate license exceptions for crates whose terms only make sense
# in context. Keep these narrowly scoped — promoting a font licence to
# a workspace-wide allow would let it apply to code crates too.
[[licenses.exceptions]]
# epaint_default_fonts ships Ubuntu Light + Hack + emoji glyphs under
# the SIL Open Font Licence and Ubuntu Font Licence respectively. Both
# are FSF-Free, permissive font-only licences; they don't touch the
# code paths we redistribute under Apache-2.0.
name = "epaint_default_fonts"
allow = ["OFL-1.1", "Ubuntu-font-1.0"]

# ---------------------------------------------------------------------------
# Bans / multiple-version check.
# ---------------------------------------------------------------------------
#
# We warn on duplicates rather than deny them: most are transitive via
# mainstream crates (ratatui, nvml-wrapper, reqwest) that we don't control,
# and an ecosystem-wide bump typically resolves them on its own. The
# `skip` list below documents known, benign duplicates as of 2026-04 so
# CI stays green without silently losing signal on *new* duplicates that
# show up in future dependency updates.
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates use `path = ...` which cargo-deny would
# otherwise flag as a wildcard. These are not published; they travel as
# a unit with the workspace.
allow-wildcard-paths = true
highlight = "all"

skip = [
    # Proc-macro helpers pulled in by different ecosystems (ratatui's
    # `instability` vs. nvml-wrapper's `wrapcenum-derive`).
    { name = "darling", version = "0.20" },
    { name = "darling_core", version = "0.20" },
    { name = "darling_macro", version = "0.20" },
    # Transitive via crossterm (older) vs tempfile/x11rb (newer).
    { name = "rustix", version = "0.38" },
    { name = "linux-raw-sys", version = "0.4" },
    # Transitive via ring/rustls (older) vs tempfile/uuid (newer).
    { name = "getrandom", version = "0.2" },
    # Transitive via ratatui (older) vs toml_edit/indexmap (newer).
    { name = "hashbrown", version = "0.15" },
    # nvml-wrapper still pins thiserror 1; global-hotkey and
    # tracing-appender pull thiserror 2.
    { name = "thiserror", version = "1" },
    { name = "thiserror-impl", version = "1" },
    # eframe/egui (tray popup) brings winit 0.30 → smithay-client-toolkit
    # 0.19 → calloop 0.13, while egui-winit's smithay-clipboard 0.7
    # already moved to smithay-client-toolkit 0.20 → calloop 0.14.
    # Will resolve when winit bumps SCT.
    { name = "calloop", version = "0.13" },
    { name = "calloop-wayland-source", version = "0.3" },
    { name = "smithay-client-toolkit", version = "0.19" },
    # ahash 0.8 (egui/epaint stack) pulls getrandom 0.3; tempfile/uuid
    # are on 0.4. Already skipping 0.2 above for the older ring path.
    { name = "getrandom", version = "0.3" },
    # hashbrown 0.15 (rusqlite) brings foldhash 0.1; ratatui/vello are
    # on hashbrown 0.16 → foldhash 0.2.
    { name = "foldhash", version = "0.1" },
    # ratatui-core 0.1 sits on hashbrown 0.16; zbus's toml_edit pulls
    # hashbrown 0.17 transitively.
    { name = "hashbrown", version = "0.16" },
    # bindgen 0.72 (whisper-rs-sys) is on itertools 0.13; ratatui-core
    # 0.1 is on 0.14.
    { name = "itertools", version = "0.13" },
    # ratatui-image 10 still depends directly on rand 0.8; the
    # quantette → icy_sixel path it also pulls is on rand 0.9.
    { name = "rand", version = "0.8" },
    { name = "rand_core", version = "0.6" },
]

# ---------------------------------------------------------------------------
# Sources: only crates.io is trusted.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
