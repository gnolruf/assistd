[package]
name = "assistd-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version = "1.85"

[[bin]]
name = "assistd"
path = "src/main.rs"

[features]
default = ["daemon", "client", "chat"]
daemon = [
    "dep:assistd-core",
    "dep:assistd-llm",
    "dep:assistd-voice",
    "dep:assistd-tools",
    "dep:assistd-wm",
    "dep:tracing",
    "dep:tracing-subscriber",
    "dep:global-hotkey",
    "dep:nvml-wrapper",
]
client = ["dep:uuid"]
chat = [
    "daemon",
    "dep:ratatui",
    "dep:crossterm",
    "dep:futures-util",
    "dep:tracing-appender",
    "dep:textwrap",
    "dep:async-trait",
]

[dependencies]
# Always-on — shared CLI plumbing and wire protocol
assistd-ipc = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }

# Daemon-only
assistd-core  = { workspace = true, optional = true }
assistd-llm   = { workspace = true, optional = true }
assistd-voice = { workspace = true, optional = true }
assistd-tools = { workspace = true, optional = true }
assistd-wm    = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }
global-hotkey = { version = "0.7", optional = true }
nvml-wrapper = { workspace = true, optional = true }

# Client-only
uuid = { workspace = true, optional = true }

# Chat TUI
ratatui          = { workspace = true, optional = true }
crossterm        = { workspace = true, optional = true }
futures-util     = { workspace = true, optional = true }
tracing-appender = { workspace = true, optional = true }
textwrap         = { workspace = true, optional = true }
async-trait      = { workspace = true, optional = true }
