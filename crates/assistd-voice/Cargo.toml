[package]
name = "assistd-voice"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["whisper", "mic", "listen"]
whisper = [
    "dep:whisper-rs",
    "dep:reqwest",
    "dep:nvml-wrapper",
    "dep:assistd-config",
    "dep:futures-util",
]
# Enables `MicVoiceInput` — cpal capture, SPSC ring buffer, resampler.
# Requires `whisper` because MicVoiceInput wraps WhisperTranscriber.
mic = ["whisper", "dep:cpal", "dep:ringbuf", "dep:rubato"]
# Enables `MicContinuousListener` — VAD-driven hands-free utterance
# segmentation that feeds completed utterances to whisper. Sits on top
# of the `mic` + `whisper` stack.
listen = ["mic", "dep:webrtc-vad"]
cuda = ["whisper-rs/cuda"]
# Gates the integration test that downloads a small model from HuggingFace.
test-support = ["whisper", "mic", "listen", "dep:hound"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
assistd-ipc = { workspace = true }

# Whisper backend
whisper-rs = { version = "0.16", optional = true, default-features = false, features = ["tracing_backend"] }
reqwest = { workspace = true, optional = true, features = ["stream"] }
nvml-wrapper = { workspace = true, optional = true }
assistd-config = { workspace = true, optional = true }
futures-util = { workspace = true, optional = true }

# Mic backend
cpal = { version = "0.15", optional = true }
ringbuf = { version = "0.4", optional = true }
rubato = { version = "0.15", optional = true }

# Continuous listening — streaming voice-activity detection
webrtc-vad = { version = "0.4", optional = true }

# Test support
hound = { version = "3.5", optional = true }

[dev-dependencies]
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
tempfile = { workspace = true }
hound = "3.5"
