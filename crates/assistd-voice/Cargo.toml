[package]
name = "assistd-voice"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["whisper"]
whisper = [
    "dep:whisper-rs",
    "dep:reqwest",
    "dep:dirs",
    "dep:thiserror",
    "dep:tracing",
    "dep:tokio",
    "dep:nvml-wrapper",
    "dep:assistd-config",
    "dep:futures-util",
]
cuda = ["whisper-rs/cuda"]
# Gates the integration test that downloads a small model from HuggingFace.
test-support = ["whisper", "dep:hound"]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
whisper-rs = { version = "0.16", optional = true, default-features = false }
reqwest = { workspace = true, optional = true }
dirs = { version = "5", optional = true }
hound = { version = "3.5", optional = true }
thiserror = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
nvml-wrapper = { workspace = true, optional = true }
assistd-config = { workspace = true, optional = true }
futures-util = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
tempfile = { workspace = true }
hound = "3.5"
